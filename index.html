<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Electrical Toolbox Pro</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <section class="hero">
      <h1>⚡ Electrical Toolbox Pro</h1>
      <p>전기 실무 자재 추천기 · Ver 1.0</p>
    </section>

    <section class="card">
      <h2>모터 자재 추천</h2>
      <div class="grid">
        <div class="full">
          <label class="title">입력 방식</label>
          <div class="radio-row">
            <label class="radio-pill"><input type="radio" name="inputMode" value="hp" checked /> HP 기준</label>
            <label class="radio-pill"><input type="radio" name="inputMode" value="kw" /> kW 기준</label>
          </div>
        </div>

        <div id="hpGroup">
          <label class="title" for="hpSelect">모터 용량(HP)</label>
          <select id="hpSelect"></select>
        </div>

        <div id="kwGroup" class="hidden">
          <label class="title" for="kwSelect">모터 용량(kW)</label>
          <select id="kwSelect"></select>
        </div>

        <div>
          <label class="title">적용 기준</label>
          <select disabled>
            <option>3상 380V / 직입기동 / CV 4C</option>
          </select>
        </div>

        <div class="full">
          <button id="recommendBtn">🔍 자재 추천</button>
        </div>
      </div>
    </section>

    <section id="result" class="card hidden">
      <div class="result-head">
        <div>
          <h2 id="motorName">-</h2>
          <p style="margin:6px 0 0;color:#6b7280;">일반 산업현장 간편 추천값</p>
        </div>
        <span class="badge">3상 380V</span>
      </div>

      <div class="result-list">
        <div class="item"><div class="name">정격전류</div><div id="current" class="value">-</div></div>
        <div class="item"><div class="name">차단기</div><div id="mccb" class="value">-</div></div>
        <div class="item"><div class="name">누전차단기</div><div id="elb" class="value">-</div></div>
        <div class="item"><div class="name">케이블</div><div id="cable" class="value">-</div></div>
        <div class="item"><div class="name">터미널</div><div id="terminal" class="value">-</div></div>
        <div class="item"><div class="name">전선관</div><div id="conduit" class="value">-</div></div>
        <div class="item"><div class="name">전선 허용전류</div><div id="iz" class="value">-</div></div>
      </div>

      <div class="kec">
        <div><strong>KEC 간편 검토</strong></div>
        <div id="kecCheck">-</div>
      </div>

      <div class="notice">
        ※ 본 추천은 3상 380V 모터의 간편 산정용입니다. 실제 적용 전 포설방법, 주위온도, 집합보정, 전압강하, 차단용량, 접지, 제조사 정격 및 사내 표준을 반드시 확인하세요.
      </div>

      <div style="margin-top:14px;">
        <button id="copyBtn" class="secondary">📋 결과 복사하기</button>
        <textarea id="copyArea" class="hidden" readonly></textarea>
      </div>
    </section>

    <p class="footer">Electrical Toolbox Pro · Ver 1.0 · KEC 원칙 기반 간편 추천</p>
  </main>

  <div id="toast" class="toast"></div>
  <script src="database.js"></script>
  <script src="script.js"></script>
</body>
</html>
